<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault — Documents</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1117;
            --surface: #161b27;
            --surface2: #1c2335;
            --border: #252f44;
            --accent: #4f9cf9;
            --accent2: #7c6af7;
            --danger: #ff4a4a;
            --warn: #ffaa00;
            --text: #dce8f5;
            --muted: #5a6a8a;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(79,156,249,0.07) 0%, transparent 60%);
        }

        /* ── TOPBAR ── */
        .topbar {
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-brand {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.12em;
        }

        .topbar-tag {
            font-family: var(--mono);
            font-size: 10px;
            background: rgba(79,156,249,0.13);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 3px;
        }

        .topbar-spacer { flex: 1; }

        #adminLoginBtn {
            padding: 7px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #adminLoginBtn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(79,156,249,0.07);
        }

        /* ── LAYOUT ── */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: calc(100vh - 56px);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .section-title {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
        }

        .search-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 9px 12px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--accent); }

        .file-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .file-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-item:hover { border-color: var(--accent); background: rgba(79,156,249,0.05); }
        .file-item.active { border-color: var(--accent); background: rgba(79,156,249,0.09); }

        .file-item-info { flex: 1; min-width: 0; }

        .file-item-name {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item-meta {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
        }

        .empty-files {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            padding: 24px 0;
        }

        /* ── MAIN ── */
        .main-area {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .page-header h1 {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 600;
        }

        .page-header p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .viewer-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            flex: 1;
        }

        .viewer-card-header {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .viewer-card-title {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text);
        }

        .btn-sm {
            padding: 6px 14px;
            border-radius: 5px;
            font-family: var(--mono);
            font-size: 11px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            transition: all 0.2s;
        }

        .btn-sm:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .btn-sm:disabled { opacity: 0.3; cursor: not-allowed; }

        #clientContent {
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.8;
            padding: 28px;
            white-space: pre-wrap;
            min-height: 350px;
            max-height: 550px;
            overflow-y: auto;
            color: var(--text);
        }

        .empty-state-msg { color: var(--muted); font-style: italic; }
        .error-msg { color: var(--danger); font-family: var(--mono); font-size: 13px; }

        /* ── MODAL ADMIN LOGIN ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            width: 360px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            transform: translateY(16px);
            transition: transform 0.2s;
        }

        .modal-overlay.open .modal { transform: translateY(0); }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-title {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 18px;
            cursor: pointer;
            line-height: 1;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.2s;
        }

        .modal-close:hover { color: var(--text); }

        .field-group { margin-bottom: 16px; }

        .field-group label {
            display: block;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }

        .field-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .field-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,156,249,0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .modal-error {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(255,74,74,0.1);
            border: 1px solid rgba(255,74,74,0.3);
            border-radius: 5px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--danger);
            text-align: center;
            display: none;
        }

        .lock-warning {
            margin-top: 8px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--warn);
            text-align: center;
            display: none;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <span class="topbar-brand">VAULT</span>
    <span class="topbar-tag">DOCUMENTS</span>
    <div class="topbar-spacer"></div>
    <button id="adminLoginBtn">🔐 Accès Admin</button>
</div>

<!-- LAYOUT -->
<div class="layout">
    <div class="sidebar">
        <div class="section-title">▸ Fichiers disponibles</div>
        <input type="text" class="search-input" id="search" placeholder="🔍 Rechercher…">
        <div class="file-list" id="fileList">
            <div class="empty-files">Chargement…</div>
        </div>
    </div>

    <div class="main-area">
        <div class="page-header">
            <h1>Documents</h1>
            <p>Sélectionnez un fichier pour afficher son contenu</p>
        </div>

        <div class="viewer-card">
            <div class="viewer-card-header">
                <span class="viewer-card-title" id="fileTitle">Contenu du fichier</span>
                <button class="btn-sm" id="downloadBtn" disabled>⬇ Télécharger</button>
            </div>
            <div id="clientContent" class="empty-state-msg">
Sélectionnez un fichier dans la liste pour afficher son contenu.
            </div>
        </div>
    </div>
</div>

<!-- MODAL ADMIN LOGIN -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">🛡 Accès Administrateur</span>
            <button class="modal-close" id="modalClose">✕</button>
        </div>

        <div class="field-group">
            <label>Identifiant</label>
            <input type="text" id="modalUser" placeholder="admin" autocomplete="off">
        </div>

        <div class="field-group">
            <label>Mot de passe</label>
            <input type="password" id="modalPass" placeholder="••••••••">
        </div>

        <button class="btn-primary" id="modalLoginBtn">Se connecter</button>
        <div class="lock-warning" id="lockWarning"></div>
        <div class="modal-error" id="modalError">⛔ Identifiants incorrects</div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  FICHIERS DISPONIBLES
//  Ajoutez / modifiez vos fichiers ici
// ═══════════════════════════════════════════════
const AVAILABLE_FILES = [
    { name: "document1.txt",  url: "../documents/document1.txt" },
    { name: "notes.txt",      url: "../documents/notes.txt" },
    { name: "rapport.txt",    url: "../documents/rapport.txt" },
    { name: "liste.txt",      url: "../documents/liste.txt" }
];

// ═══════════════════════════════════════════════
//  COMPTE ADMIN — hash SHA-256 du mot de passe
//  "admin1234" → 3a7bd3e2360a3d29eea436fcfb7e44c735d117c42d1c1835420b6b9942dd4f1b
//  Générer : https://emn178.github.io/online-tools/sha256.html
// ═══════════════════════════════════════════════
const ADMIN = {
    user: "admin",
    hash: "3a7bd3e2360a3d29eea436fcfb7e44c735d117c42d1c1835420b6b9942dd4f1b"
};

const ADMIN_URL = "../admin/index.html";

// ═══════════════════════════════════════════════
//  CRYPTO
// ═══════════════════════════════════════════════
async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════════════
let currentFile = null;
let currentContent = null;

// ═══════════════════════════════════════════════
//  RENDU LISTE
// ═══════════════════════════════════════════════
function renderFileList(files) {
    const list = document.getElementById("fileList");
    list.innerHTML = "";

    if (files.length === 0) {
        list.innerHTML = '<div class="empty-files">Aucun fichier disponible</div>';
        return;
    }

    files.forEach(f => {
        const item = document.createElement("div");
        item.className = "file-item" + (currentFile && currentFile.name === f.name ? " active" : "");
        item.innerHTML = `
            <span>📄</span>
            <div class="file-item-info">
                <div class="file-item-name">${f.name}</div>
                <div class="file-item-meta">Fichier texte</div>
            </div>
        `;
        item.addEventListener("click", () => loadFile(f));
        list.appendChild(item);
    });
}

document.getElementById("search").addEventListener("input", function() {
    const v = this.value.toLowerCase();
    renderFileList(AVAILABLE_FILES.filter(f => f.name.toLowerCase().includes(v)));
});

// ═══════════════════════════════════════════════
//  CHARGEMENT FICHIER
// ═══════════════════════════════════════════════
async function loadFile(file) {
    currentFile = file;
    currentContent = null;
    renderFileList(AVAILABLE_FILES.filter(f =>
        f.name.toLowerCase().includes(document.getElementById("search").value.toLowerCase())
    ));

    const el = document.getElementById("clientContent");
    el.className = "";
    el.style.color = "var(--muted)";
    el.textContent = "⏳ Chargement…";
    document.getElementById("fileTitle").textContent = "📄 " + file.name;
    document.getElementById("downloadBtn").disabled = true;

    try {
        const res = await fetch(file.url);
        if (!res.ok) throw new Error("Fichier introuvable");
        const text = await res.text();
        currentContent = text;
        el.style.color = "var(--text)";
        el.textContent = text;
        document.getElementById("downloadBtn").disabled = false;
    } catch(e) {
        el.className = "error-msg";
        el.textContent = "❌ Impossible de charger le fichier.\n" + e.message;
    }
}

// ═══════════════════════════════════════════════
//  TÉLÉCHARGEMENT
// ═══════════════════════════════════════════════
document.getElementById("downloadBtn").addEventListener("click", () => {
    if (!currentFile || !currentContent) return;
    const blob = new Blob([currentContent], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = currentFile.name;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
});

// ═══════════════════════════════════════════════
//  MODAL ADMIN
// ═══════════════════════════════════════════════
const overlay = document.getElementById("modalOverlay");

document.getElementById("adminLoginBtn").addEventListener("click", () => {
    overlay.classList.add("open");
    document.getElementById("modalUser").focus();
});

document.getElementById("modalClose").addEventListener("click", closeModal);

overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });

document.getElementById("modalPass").addEventListener("keydown", e => {
    if (e.key === "Enter") doAdminLogin();
});

document.getElementById("modalLoginBtn").addEventListener("click", doAdminLogin);

function closeModal() {
    overlay.classList.remove("open");
    document.getElementById("modalUser").value = "";
    document.getElementById("modalPass").value = "";
    document.getElementById("modalError").style.display = "none";
    document.getElementById("lockWarning").style.display = "none";
}

// Anti-bruteforce
let failCount = 0;
let lockUntil = 0;

async function doAdminLogin() {
    const now = Date.now();
    if (now < lockUntil) {
        const secs = Math.ceil((lockUntil - now) / 1000);
        showLock(`⏳ Trop de tentatives. Réessayez dans ${secs}s.`);
        return;
    }

    const user = document.getElementById("modalUser").value.trim();
    const pass = document.getElementById("modalPass").value;
    const btn  = document.getElementById("modalLoginBtn");

    btn.disabled = true;
    btn.textContent = "Vérification…";

    const hash = await sha256(pass);

    if (user === ADMIN.user && hash === ADMIN.hash) {
        btn.textContent = "✅ Redirection…";
        setTimeout(() => { window.location.href = ADMIN_URL; }, 800);
    } else {
        failCount++;
        btn.disabled = false;
        btn.textContent = "Se connecter";

        const err = document.getElementById("modalError");
        err.style.display = "block";
        setTimeout(() => { err.style.display = "none"; }, 3000);

        if (failCount >= 5) {
            const delay = Math.min(60000, 5000 * Math.pow(2, failCount - 5));
            lockUntil = Date.now() + delay;
            showLock(`⚠️ Bloqué pendant ${delay / 1000}s`);
            setTimeout(() => { document.getElementById("lockWarning").style.display = "none"; }, delay);
        }
    }
}

function showLock(msg) {
    const w = document.getElementById("lockWarning");
    w.textContent = msg;
    w.style.display = "block";
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
renderFileList(AVAILABLE_FILES);
</script>

</body>
</html>
